<style>
body { scroll-behavior: smooth; }

/* Navbar */
.navbar { background: #000; }
.nav-link, .navbar-brand { color: #fff !important; }

/* Carousel */
.carousel img { height: 500px; object-fit: cover; }

/* Section */
.section { padding: 60px 0; }

body {
    background: #f5f7fa;
    font-family: Arial;
}

h2 {
    text-align: center;
    margin: 30px 0;
}

/* Timeline */
.timeline {
    position: relative;
    max-width: 800px;
    margin: auto;
}

.timeline::after {
    content: '';
    position: absolute;
    width: 4px;
    background: #ccc;
    top: 0;
    bottom: 0;
    left: 50%;
    margin-left: -2px;
}

/* Container */
.container-tl {
    padding: 20px 40px;
    position: relative;
    width: 50%;
}

/* Left side */
.left {
    left: 0;
}

/* Right side */
.right {
    left: 50%;
}

/* Circle */
.container-tl::after {
    content: '';
    position: absolute;
    width: 15px;
    height: 15px;
    right: -8px;
    background: green;
    border-radius: 50%;
    top: 30px;
}

/* Fix for right */
.right::after {
    left: -8px;
}

/* Card styling */
.content {
    padding: 20px;
    border-radius: 10px;
    color: white;
}

.blue { background: linear-gradient(45deg,#3a7bd5,#00d2ff); }
.pink { background: linear-gradient(45deg,#ff758c,#ff7eb3); }
.red { background: linear-gradient(45deg,#ff512f,#dd2476); }



footer {
  background: #000;
  color: #fff;
  padding: 20px;
  text-align: center;
}
</style>
</head>
